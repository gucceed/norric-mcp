      - vigil_ownership_velocity_v1
      - signal_score_municipality_v1
      - signal_weekly_call_list_v1
      - signal_municipality_briefing_v1
      - signal_contract_expiry_alerts_v1
      - signal_sweden_pulse_v1
      - sigvik_score_brf_v1
